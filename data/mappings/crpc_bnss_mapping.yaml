# CrPC ↔ BNSS Section Mapping
#
# Procedural-code mapping: Code of Criminal Procedure, 1973 ↔
# Bharatiya Nagarik Suraksha Sanhita, 2023. Effective for proceedings
# initiated on or after 1 July 2024.
#
# Source of truth: MHA Comparative Table published with the BNSS Bill
# (2023) and the PRS India side-by-side comparison. Sub-section
# precision is more doctrinally consequential here than in the
# substantive-code mapping (IPC↔BNS), so entries are flagged
# ``needs_verification: true`` aggressively wherever recall-based
# memory of the comparative tables doesn't meet a 95%+ confidence bar
# against the enacted Gazette text.
#
# Number-collision watch: CrPC 482 (HC inherent powers) → BNSS 528.
# BNSS 482 is anticipatory bail (← CrPC 438). The test
# ``test_482_does_not_alias_to_482`` enforces this distinction.
#
# Ordering: built phase-by-phase, in citation-frequency-driven priority
# order from the 1,579-doc Supreme Court corpus inventory snapshot of
# 2026-04-26. Phase boundaries marked in comments below.

version: "0.1"
source: "MHA Comparative Table (BNSS Bill 2023); PRS India BNSS analytical note (2023)"
last_verified: "2026-04-26"

mappings:

  # =========================================================================
  # PHASE A — Inherent / revisional powers (3 entries)
  # =========================================================================
  # CrPC 482 alone accounts for 345 of the 4,135 CrPC citations in the
  # corpus (rank 1 by a wide margin). Every quash-petition jurisprudence
  # rests on this section; the BNSS 528 carry-over is the highest-stakes
  # single mapping in this entire table.

  - crpc: "482"
    bnss: ["528"]
    relationship: one_to_one
    subject: "Inherent powers of the High Court"
    crpc_title: "Saving of inherent powers of High Court"
    bnss_title: "Saving of inherent powers of High Court"
    notes: "The most-cited CrPC section in the corpus (345 citations of 4,135 total). BNSS 528 retains the inherent-powers framework verbatim — including the three classical limbs (give effect to any order under this Sanhita / prevent abuse of process / secure the ends of justice). Whether the BNSS makes any subtle scope changes (e.g., explicit limits on quashing in heinous offences) is the verification question — recall-based mapping pending Gazette cross-check. NUMBER COLLISION: BNSS 482 is anticipatory bail (CrPC 438), unrelated to this section."
    needs_verification: true
    source: "MHA Table (recall); flagged for Gazette verification per Guardrail 1"

  - crpc: "401"
    bnss: ["442"]
    relationship: one_to_one
    subject: "High Court's powers of revision"
    crpc_title: "High Court's powers of revision"
    bnss_title: "High Court's powers of revision"
    notes: "The HC revisional power retained in BNSS 442. Sub-section structure governs whether the BNSS limits revision after a Sessions Court has already exercised concurrent revision under 397/438; needs verification."
    needs_verification: true
    source: "MHA Table (recall)"

  - crpc: "397"
    bnss: ["438"]
    relationship: one_to_one
    subject: "Concurrent revisional jurisdiction"
    crpc_title: "Calling for records to exercise powers of revision"
    bnss_title: "Calling for records to exercise powers of revision"
    notes: "Concurrent revisional jurisdiction of HC and Sessions Court. BNSS 438 retains the framework; the 397(3) bar on second revision after one has been exercised is the doctrinal load-bearing piece — verification needed."
    needs_verification: true
    source: "MHA Table (recall)"

