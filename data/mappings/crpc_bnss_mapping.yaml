    notes: "DOCTRINE-CARRYING SECTION. The 167(2) default-bail right — accused is entitled to bail if chargesheet not filed within 60 days (offence punishable with imprisonment of less than 10 years) or 90 days (offences punishable with death/life/10+ years). The Sanjay Dutt and Bikramjit Singh lines of jurisprudence rest on this section. BNSS 187(3) is the structural successor; the BNSS may have introduced a 180-day extended ceiling for organised-crime / terrorist-act offences (BNS 111, 113) — verify whether this is in 187 itself or a parallel provision. This is one of the most consequential procedural mappings in the entire transition and needs Gazette verification before any high-confidence claim. Per Guardrail 1, marked needs_verification: true."
