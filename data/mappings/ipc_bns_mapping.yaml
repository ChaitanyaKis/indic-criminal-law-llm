    subject: "Abetment of suicide of child or insane person"
    ipc_title: "Abetment of suicide of child or insane person"
    bns_title: "Abetment of suicide of child or person of unsound mind"
    notes: null

  - ipc: "306"
    bns: ["108"]
    relationship: one_to_one
    subject: "Abetment of suicide"
    ipc_title: "Abetment of suicide"
    bns_title: "Abetment of suicide"
    notes: null

  - ipc: "307"
    bns: ["109"]
    relationship: one_to_one
    subject: "Attempt to murder"
    ipc_title: "Attempt to murder"
    bns_title: "Attempt to murder"
    notes: null

  - ipc: "308"
    bns: ["110"]
    relationship: one_to_one
    subject: "Attempt to culpable homicide"
    ipc_title: "Attempt to commit culpable homicide"
    bns_title: "Attempt to commit culpable homicide"
    notes: null

  - ipc: "309"
    bns: []
    relationship: removed
    subject: "Attempt to suicide"
    ipc_title: "Attempt to commit suicide"
    bns_title: null
    notes: "Effectively decriminalised by s.115 Mental Healthcare Act 2017 (presumption of severe stress). BNS does not re-enact a general attempt-to-suicide offence. BNS 226 creates a narrower, distinct offence — attempt to commit suicide to compel or restrain exercise of lawful power by a public servant — which is not the IPC 309 analogue. De facto decriminalized by Section 115, Mental Healthcare Act 2017. BNS 226 covers attempt to commit suicide to compel or restrain a public servant — a distinct and narrower offence, not an analogue of IPC 309."

