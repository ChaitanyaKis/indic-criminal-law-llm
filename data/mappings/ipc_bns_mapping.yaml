# IPC ↔ BNS Section Mapping
#
# Seed data for the IPC → BNS (Bharatiya Nyaya Sanhita, 2023) section mapping,
# effective for offences committed on/after 1 July 2024.
#
# Source of truth: MHA comparative table published with the BNS / BNSS / BSA
# Bills (2023) and the PRS India side-by-side comparison. Individual entries
# with sub-section-level precision flagged as needs_verification: true are
# best-available guesses pending a per-section cross-check against the
# enacted BNS text.
#
# Coverage target (Week 2): ~50 headline sections across the high-traffic
# chapters of the IPC (life, body, sexual offences, property, public
# tranquillity, conspiracy, intimidation, marriage/dowry). Amendments,
# ancillary statutes, and BNSS/BSA mappings live in separate files.
#
# Relationship vocabulary:
#   one_to_one    - single IPC section maps to a single BNS section (or sub-section)
#   one_to_many   - single IPC section split across several BNS sections
#   many_to_one   - several IPC sections consolidated into one BNS section
#   removed       - IPC section has no BNS counterpart (repealed/decriminalised)
#   new_in_bns    - BNS provision with no direct IPC ancestor (ipc_section is null)

version: "0.1"
source: "MHA Comparative Table (BNS Bill 2023); PRS India BNS/BNSS/BSA comparison (2023)"
last_verified: "2026-04-22"

mappings:

  # -------------------------------------------------------------------------
  # Murder & homicide (IPC Chapter XVI → BNS Chapter VI "Offences affecting
  # the human body", Part A "Offences affecting life")
  # -------------------------------------------------------------------------

  - ipc: "299"
    bns: ["100"]
    relationship: one_to_one
    subject: "Culpable homicide"
    ipc_title: "Culpable homicide"
    bns_title: "Culpable homicide"
    notes: "Definitional section; substantive language preserved."

  - ipc: "300"
    bns: ["101"]
    relationship: one_to_one
    subject: "Murder"
    ipc_title: "Murder"
    bns_title: "Murder"
    notes: "Definition with five exceptions carried over; exception numbering unchanged in substance."

  - ipc: "302"
    bns: ["103(1)"]
    relationship: one_to_one
    subject: "Murder"
    ipc_title: "Punishment for murder"
    bns_title: "Punishment for murder"
    notes: "BNS 103(2) adds a new mob-lynching sub-offence within the same section."

  - ipc: "303"
    bns: ["104"]
    relationship: one_to_one
    subject: "Murder by life-convict"
    ipc_title: "Punishment for murder by life-convict"
    bns_title: "Punishment for murder by life-convict"
    notes: "IPC 303 was struck down in Mithu v State of Punjab (1983); BNS 104 re-enacts with judicially-informed sentencing (life or death, not mandatory death)."

  - ipc: "304"
    bns: ["105"]
    relationship: one_to_one
    subject: "Culpable homicide not amounting to murder"
    ipc_title: "Punishment for culpable homicide not amounting to murder"
    bns_title: "Punishment for culpable homicide not amounting to murder"
    notes: "IPC 304 Part I (intent) and Part II (knowledge) distinction preserved within the body of BNS 105. Minimum sentence for the intent limb raised to 5 years."

  - ipc: "304A"
    bns: ["106(1)"]
    relationship: one_to_one
    subject: "Death by negligence"
    ipc_title: "Causing death by negligence"
    bns_title: "Causing death by negligence"
    notes: "BNS 106(2) adds a distinct, harsher hit-and-run offence (fleeing without reporting to police/magistrate) with up to 10 years — no IPC ancestor."

  - ipc: "304B"
